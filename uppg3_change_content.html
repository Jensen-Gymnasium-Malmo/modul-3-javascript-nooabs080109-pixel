<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>Uppgift 3: Change content</title>
  <style>
    .recipe {
      display: none;
    }
  </style>
</head>

<body>

<button onclick="showCarbonara()">Carbonara</button>
<button onclick="showPizza()">Pizza</button>

<div id="ingredients"></div>

<script>
function showCarbonara() {
  document.getElementById("ingredients").innerHTML =
    "<h2>Carbonara Ingredients</h2><ul><li>Spaghetti</li><li>Eggs</li><li>Pancetta</li><li>Parmesan</li><li>Black pepper</li></ul>";
}

function showPizza() {
  document.getElementById("ingredients").innerHTML =
    "<h2>Pizza Ingredients</h2><ul><li>Flour</li><li>Tomato sauce</li><li>Mozzarella</li><li>Pepperoni</li><li>Mushrooms</li></ul>";
}
</script>

</body>
</html>
