<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Uppgift 3: Change content</title>
    <style>
      .recipe {
        display: none;
      }
    </style>
  </head>
  <body>
    <button onclick="showCarbonara()">Show carbonara ingredients</button>
    <button onclick="showPizza()">Show pizza ingredients</button>

    <div id="ingredients"></div>

    <script>
      function showCarbonara() {
        const ingredientsDiv = document.getElementById("ingredients");
        ingredientsDiv.innerHTML = `
          <h2>Carbonara Ingredients</h2>
          <ul>
            <li>Spaghetti</li>
            <li>Eggs</li>
            <li>Pancetta</li>
            <li>Parmesan cheese</li>
            <li>Black pepper</li>
          </ul>
        `;
      }

      function showPizza() {
        const ingredientsDiv = document.getElementById("ingredients");
        ingredientsDiv.innerHTML = `
          <h2>Pizza Ingredients</h2>
          <ul>
            <li>Flour</li>
            <li>Tomato sauce</li>
            <li>Mozzarella cheese</li>
            <li>Pepperoni</li>
            <li>Mushrooms</li>
          </ul>
        `;
      }

      if (window.location.hash === "#carbonara") {
        showCarbonara();
      } else if (window.location.hash === "#pizza") {
        showPizza();
      }
    </script>
  </body> 
</html>
