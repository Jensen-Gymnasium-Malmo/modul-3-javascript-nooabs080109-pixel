<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>Uppgift 2: Buttons</title>
</head>

<body>

<h2>Välj rätt svar</h2>

<button onclick="showCorrect()">Svar 1</button>
<button onclick="showIncorrect()">Svar 2</button>
<button onclick="showIncorrect()">Svar 3</button>
<button onclick="showIncorrect()">Svar 4</button>
<button onclick="showIncorrect()">Svar 5</button>

<script>
function showCorrect() {
  alert("Correct!");
}

function showIncorrect() {
  alert("Incorrect!");
}
</script>

</body>
</html>
