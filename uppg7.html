<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Uppgift 7</title>
</head>

<body>

<h2>Skriv din favoritmat 🍔</h2>

<input type="text" id="food" placeholder="Favoritmat">
<button onclick="showFood()">Skicka</button>

<p id="result"></p>

<script>
function showFood() {

    let food = document.getElementById("food").value;
    let result = document.getElementById("result");

    if (food.trim() === "") {
        result.textContent = "Du måste skriva något!";
    } else {
        result.textContent = "Din favoritmat är " + food + " 😋 MUMS!";
    }
}
</script>

</body>
</html>
