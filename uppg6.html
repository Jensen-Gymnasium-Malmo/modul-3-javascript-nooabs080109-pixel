<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Favoritmat</title>
</head>

<body>

<h2>Skriv din favoritmat 🍔</h2>

<input type="text" id="food" placeholder="Favoritmat">
<button onclick="showAlert()">Skicka</button>

<script>
function showAlert() {

    let food = document.getElementById("food").value;

    if (food.trim() === "") {
        alert("Du måste skriva något!");
        return;
    }

    alert("Välkommen till hemsidan! Din favoritmat är " + food + " 😋 MUMS!");
}
</script>

</body>
</html>
